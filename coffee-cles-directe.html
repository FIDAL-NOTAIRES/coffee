<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COFFEE · Bordereau de remise directe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--ink:#20283D;--ink-soft:#4A5269;--paper:#EEEEE9;--card:#FFFFFF;--line:#DEDCD3;--emerald:#2E5A4B;--emerald-d:#244A3D;--urgent:#B5462F;--gold:#A98A45;}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;padding:18px}
  .wrap{max-width:1080px;margin:0 auto}
  header{margin-bottom:22px}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--urgent);margin-bottom:10px}
  .eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--urgent);box-shadow:0 0 0 4px rgba(181,70,47,.14)}
  .wordmark{font-family:'Fraunces',serif;font-weight:500;font-size:30px;letter-spacing:-.01em;line-height:1.05}
  .sub{color:var(--ink-soft);font-size:14.5px;margin-top:4px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .panel h2{font-family:'Fraunces',serif;font-weight:500;font-size:19px;margin-bottom:4px}
  .hint{color:var(--ink-soft);font-size:13px;margin-bottom:16px}
  label.fld{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 6px}
  input[type=text],input[type=date],textarea{width:100%;font:inherit;color:var(--ink);background:#FBFBF8;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  textarea{min-height:60px;resize:vertical}
  input:focus,textarea:focus{outline:2px solid rgba(46,90,75,.35);border-color:var(--emerald)}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .seg{display:flex;flex-wrap:wrap;background:#F1F0EA;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
  .seg button{font:inherit;font-weight:500;border:0;background:none;color:var(--ink-soft);padding:8px 14px;border-radius:7px;cursor:pointer;flex:1;white-space:nowrap}
  .seg button.on{background:var(--emerald);color:#fff}
  .checklist{display:flex;flex-direction:column;gap:6px}
  .chk{display:flex;align-items:center;gap:10px;background:#FBFBF8;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .chk.on{border-color:var(--emerald);background:rgba(46,90,75,.05)}
  .chk input[type=checkbox]{width:18px;height:18px;accent-color:var(--emerald)}
  .chk span{flex:1;font-size:14.5px}
  .chk .qty{width:66px;flex:none}.chk .qty select{width:100%;padding:7px 6px;font:inherit;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;text-align:center}
  .addrow{display:flex;gap:8px;margin-top:8px}.addrow input{flex:1}
  .btn-add{font:inherit;font-weight:500;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:0 14px;cursor:pointer}
  .photo-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:1.5px dashed var(--line);background:#FBFBF8;border-radius:12px;padding:16px;cursor:pointer;color:var(--ink-soft);font-weight:500}
  .photo-btn svg{width:20px;height:20px}
  .photo-thumb{margin-top:10px;border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .photo-thumb img{display:block;width:100%}
  .photo-meta{font-size:12px;color:var(--ink-soft);padding:6px 10px}
  .cond{display:none}.cond.show{display:block}
  .plus-btn{font:inherit;font-weight:600;color:var(--emerald-d);background:rgba(46,90,75,.06);border:1px solid var(--line);border-radius:10px;padding:11px 14px;cursor:pointer;width:100%;text-align:left}
  .collapse{display:none;margin-top:8px}.collapse.open{display:block}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 26px -8px rgba(32,40,61,.28);z-index:30;overflow:hidden;display:none}
  .ac-list.show{display:block}
  .ac-item{padding:9px 12px;font-size:14px;cursor:pointer;border-bottom:1px solid #F1F0EA}
  .ac-item:last-child{border-bottom:0}
  .ac-item:hover,.ac-item.active{background:rgba(46,90,75,.08)}
  .ac-item .ctx{display:block;font-size:12px;color:var(--ink-soft)}
  .ac-status{font-size:12px;margin-top:6px;min-height:15px}
  .ac-status.ok{color:var(--emerald-d)} .ac-status.ok::before{content:"✓ "}
  .ac-status.warn{color:var(--gold)} .ac-status.busy{color:var(--ink-soft)}
  .idbox{margin-top:6px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#FBFBF8}
  .partial-box{margin-top:6px;padding:14px;border:1px solid var(--line);border-radius:12px;background:#FBFBF8}
  .actions{display:flex;gap:10px;margin-bottom:14px}
  .btn{font:inherit;font-weight:600;border:0;border-radius:10px;padding:11px 16px;cursor:pointer}
  .btn-print{background:var(--emerald);color:#fff}
  .btn-copy{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn:disabled{opacity:.6;cursor:default}
  #repSelect{width:100%;font:inherit;color:var(--ink);background:#FBFBF8;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  #repSelect:focus,#repManual:focus{outline:2px solid rgba(46,90,75,.35);border-color:var(--emerald)}
  .mic-row{display:flex;gap:8px}.mic-row input{flex:1}
  .mic-btn{flex:none;width:46px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;color:var(--ink-soft);display:flex;align-items:center;justify-content:center}
  .mic-btn svg{width:20px;height:20px}
  .mic-btn.rec{background:var(--urgent);color:#fff;border-color:var(--urgent);animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.55}}
  .doc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:26px}
  .doc .head{border-bottom:1.5px solid var(--ink);padding-bottom:12px;margin-bottom:16px}
  .doc .office{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .doc .title{font-family:'Fraunces',serif;font-weight:500;font-size:21px;margin-top:4px}
  .doc .ctxtag{display:inline-block;margin-top:6px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--emerald-d);background:rgba(46,90,75,.08);padding:3px 9px;border-radius:20px}
  .doc p{font-size:13.5px;margin:7px 0;line-height:1.5}
  .doc .lead{color:var(--ink-soft)}
  .doc b{font-weight:600}
  .doc .keys-list{list-style:none;margin:4px 0 8px;font-size:13.5px}
  .doc .keys-list li{padding:2px 0;border-bottom:1px dotted var(--line)}
  .doc .keys-list li:last-child{border-bottom:0}
  .declbox{margin:12px 0;padding:10px 0 10px 14px;border-left:3px solid var(--emerald);font-size:13.5px}
  .declbox .who{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--emerald-d);margin-bottom:3px}
  .proofs{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
  .proof-item{flex:1;min-width:150px;text-align:center}
  .proof-item img{display:block;width:100%;border-radius:8px;border:1px solid var(--line)}
  .proof-item .cap{font-size:11px;color:var(--ink-soft);margin-top:4px}
  .muted{color:var(--ink-soft);font-style:italic;font-size:13px}
  .sigs{display:flex;gap:26px;margin-top:24px}
  .sigs .s{flex:1;text-align:center}
  .sigs .line{height:44px;border-bottom:1px solid var(--ink);margin-bottom:6px}
  .sigs small{font-size:12px;color:var(--ink-soft)}
  .footnote{margin-top:16px;font-size:11px;color:var(--ink-soft);border-top:1px solid var(--line);padding-top:10px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-size:14px;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media print{
    @page{size:A4;margin:13mm}
    body{background:#fff;padding:0}.wrap{max-width:none}
    header,.panel.form,.actions,.hint{display:none!important}
    .grid{display:block}.panel.out{border:0;padding:0}.panel.out h2{display:none}
    .doc{border:0;border-radius:0;padding:0}.doc .title{font-size:19px}
    .doc p,.doc .keys-list,.declbox{font-size:11.5px}
    .proof-item img{max-height:46mm;width:auto;max-width:100%;margin:0 auto}
    .sigs{margin-top:16px}.sigs .line{height:32px}
  }
</style></head>
<body><div class="wrap">
  <header>
    <div class="eyebrow">COFFEE · en séance</div>
    <div class="wordmark">Bordereau de remise directe</div>
    <div class="sub">Le vendeur remet, l'acquéreur récupère. L'étude n'est que témoin ; les deux parties signent.</div>
  </header>
  <div class="grid">
    <div class="panel form">
      <h2>Les informations</h2>
      <div class="hint">Adresse, parties et leur identité, clés (photo ou détail).</div>

      <label class="fld">Bien (adresse)</label>
      <div class="ac" id="bienAc"><input type="text" id="bien" placeholder="Commencez à taper l'adresse…" autocomplete="off"><div class="ac-list" id="bienList"></div></div>
      <div class="ac-status" id="bienStatus"></div>

      <label class="fld">Vendeur (nom)</label>
      <input type="text" id="vendeur" placeholder="Vendeur (nom)">
      <div id="idWrap1">
        <label class="fld">Identité du vendeur</label>
        <div class="idbox">
          <label class="fld" style="margin-top:0">Photo de la pièce d'identité</label>
          <label class="photo-btn" for="idPhotoInput1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M13 9h5M13 13h5M5 16h9"/></svg><span id="idPhotoLabel1">Prendre / choisir une photo</span></label>
          <input type="file" id="idPhotoInput1" accept="image/*" capture="environment" style="display:none">
          <div class="photo-thumb" id="idPhotoThumb1" style="display:none"><img id="idPhotoImg1" alt=""><div class="photo-meta" id="idPhotoMeta1"></div></div>
          <button type="button" class="plus-btn" id="idManualToggle1" style="margin-top:10px">+ Renseigner manuellement</button>
          <div class="collapse" id="idManualCollapse1">
            <label class="fld">Pièce d'identité</label>
            <div class="seg" id="idTypeSeg1"></div>
            <label class="fld">Numéro de la pièce</label>
            <input type="text" id="idNum1" placeholder="N° de la pièce">
          </div>
        </div>
      </div>

      <label class="fld">Acquéreur (nom)</label>
      <input type="text" id="acquereur" placeholder="Acquéreur (nom)">
      <div id="idWrap2">
        <label class="fld">Identité de l'acquéreur</label>
        <div class="idbox">
          <label class="fld" style="margin-top:0">Photo de la pièce d'identité</label>
          <label class="photo-btn" for="idPhotoInput2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="11" r="2"/><path d="M13 9h5M13 13h5M5 16h9"/></svg><span id="idPhotoLabel2">Prendre / choisir une photo</span></label>
          <input type="file" id="idPhotoInput2" accept="image/*" capture="environment" style="display:none">
          <div class="photo-thumb" id="idPhotoThumb2" style="display:none"><img id="idPhotoImg2" alt=""><div class="photo-meta" id="idPhotoMeta2"></div></div>
          <button type="button" class="plus-btn" id="idManualToggle2" style="margin-top:10px">+ Renseigner manuellement</button>
          <div class="collapse" id="idManualCollapse2">
            <label class="fld">Pièce d'identité</label>
            <div class="seg" id="idTypeSeg2"></div>
            <label class="fld">Numéro de la pièce</label>
            <input type="text" id="idNum2" placeholder="N° de la pièce">
          </div>
        </div>
      </div>

      <label class="fld">Remise de clés</label>
      <div class="seg" id="remiseSeg"></div>
      <div class="cond partial-box" id="partialBox">
        <label class="fld" style="margin-top:0">Éléments non remis ce jour</label>
        <textarea id="missingWhat" placeholder="Ex. : un double des clés de la porte d'entrée"></textarea>
        <div class="row"><div><label class="fld">Détenus par</label><input type="text" id="missingWho"></div><div><label class="fld">Remise prévue le</label><input type="date" id="missingWhen"></div></div>
      </div>

      <label class="fld">Photo des clés (preuve)</label>
      <label class="photo-btn" for="photoInput"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4l1.5 2h3a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l1.5-2z"/><circle cx="12" cy="13" r="3.5"/></svg><span id="photoLabel">Prendre / choisir une photo</span></label>
      <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
      <div class="photo-thumb" id="photoThumb" style="display:none"><img id="photoImg" alt=""><div class="photo-meta" id="photoMeta"></div></div>

      <label class="fld">Détail des clés et accès (facultatif)</label>
      <button type="button" class="plus-btn" id="keysToggle">+ Détailler les clés et accès</button>
      <div class="collapse" id="keysCollapse"><div class="checklist" id="keysList"></div>
        <div class="addrow"><input type="text" id="keyAdd" placeholder="Ajouter un accès…"><button class="btn-add" onclick="addKey()">Ajouter</button></div></div>
    </div>

    <div class="panel out">
      <h2>Bordereau</h2>
      <div class="actions">
        <button class="btn btn-print" onclick="sendMail(this)">Envoyer par e-mail</button>
        <button class="btn btn-copy" onclick="downloadPdf(this)">Télécharger le PDF</button>
        <button class="btn btn-copy" onclick="window.print()">Imprimer</button>
        <button class="btn btn-copy" onclick="copyText()">Copier le texte</button>
      </div>
      <div class="doc" id="doc"></div>
    </div>
  </div>
</div><div class="toast" id="toast">Texte copié</div>
<script>
const OFFICE="FIDAL Notaires — Paris";
const DOCTITLE="Bordereau de remise directe";
const DOCSLUG="Bordereau-remise-directe";
const DEFAULT_KEYS=["Clés porte d'entrée","Clés boîte aux lettres","Badge / bip Vigik","Télécommande portail / garage","Clés cave","Clés garage","Clés local vélos"];
const IDTYPES=[["CNI","carte nationale d'identité"],["Passeport","passeport"],["Titre de séjour","titre de séjour"],["Permis","permis de conduire"]];
let state={keys:DEFAULT_KEYS.map(k=>({label:k,on:false,qty:1})),remise:"Complète",photo:null,photoTime:null,id1:{type:"CNI",photo:null,time:null},id2:{type:"CNI",photo:null,time:null}};

function val(id){const e=document.getElementById(id);return e?(e.value||"").trim():"";}
function ph(t){return `<span class="muted">${t}</span>`;}
function fmtDate(d){return d.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});}
function fmtDT(d){return fmtDate(d)+" à "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});}
function fmtDateInput(s){if(!s)return null;return fmtDate(new Date(s+"T00:00:00"));}
function idTypeLabel(t){return IDTYPES.find(x=>x[0]===t)[1];}
function idSentence(slot,who){const num=val(slot==="id1"?"idNum1":"idNum2");const photo=state[slot].photo;if(!num&&!photo)return"";
  return ` L'identité ${who} a été justifiée par ${idTypeLabel(state[slot].type)}${num?` n° ${num}`:""}${photo?", dont la photographie est annexée au présent bordereau":""}.`;}

function buildKeys(){const el=document.getElementById("keysList");el.innerHTML="";
  state.keys.forEach((k,i)=>{const row=document.createElement("label");row.className="chk"+(k.on?" on":"");
    const opts=Array.from({length:10},(_,n)=>`<option value="${n+1}" ${k.qty===n+1?"selected":""}>${n+1}</option>`).join("");
    row.innerHTML=`<input type="checkbox" ${k.on?"checked":""}><span>${k.label}</span><span class="qty"><select ${k.on?"":"disabled"}>${opts}</select></span>`;
    row.querySelector('input[type=checkbox]').onchange=e=>{state.keys[i].on=e.target.checked;render();};
    row.querySelector('select').onchange=e=>{state.keys[i].qty=parseInt(e.target.value);render();};el.appendChild(row);});}
function addKey(){const inp=document.getElementById("keyAdd");const v=inp.value.trim();if(!v)return;state.keys.push({label:v,on:true,qty:1});inp.value="";render();}
function buildRemise(){const el=document.getElementById("remiseSeg");el.innerHTML="";
  ["Complète","Partielle"].forEach(v=>{const b=document.createElement("button");b.textContent=v;if(state.remise===v)b.className="on";
    b.onclick=()=>{state.remise=v;document.getElementById("partialBox").classList.toggle("show",v==="Partielle");render();};el.appendChild(b);});}
function buildIdSeg(slot,segId){const el=document.getElementById(segId);el.innerHTML="";
  IDTYPES.forEach(([k])=>{const b=document.createElement("button");b.textContent=k;if(state[slot].type===k)b.className="on";
    b.onclick=()=>{state[slot].type=k;render();};el.appendChild(b);});}

document.getElementById("keyAdd").addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addKey();}});
const keysToggle=document.getElementById("keysToggle");
keysToggle.onclick=()=>{const c=document.getElementById("keysCollapse");const o=c.classList.toggle("open");keysToggle.textContent=o?"− Masquer le détail des clés":"+ Détailler les clés et accès";};
[1,2].forEach(n=>{const t=document.getElementById("idManualToggle"+n);t.onclick=()=>{const c=document.getElementById("idManualCollapse"+n);const o=c.classList.toggle("open");t.textContent=o?"− Masquer la saisie manuelle":"+ Renseigner manuellement";};});

function bindPhoto(inputId,target,labelId,thumbId,imgId,metaId){document.getElementById(inputId).addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{target.set(ev.target.result,new Date());document.getElementById(labelId).textContent="Remplacer la photo";document.getElementById(thumbId).style.display="block";
    document.getElementById(imgId).src=target.get();document.getElementById(metaId).textContent="Prise le "+fmtDT(target.time());render();};r.readAsDataURL(f);});}
bindPhoto("photoInput",{set:(p,t)=>{state.photo=p;state.photoTime=t;},get:()=>state.photo,time:()=>state.photoTime},"photoLabel","photoThumb","photoImg","photoMeta");
bindPhoto("idPhotoInput1",{set:(p,t)=>{state.id1.photo=p;state.id1.time=t;},get:()=>state.id1.photo,time:()=>state.id1.time},"idPhotoLabel1","idPhotoThumb1","idPhotoImg1","idPhotoMeta1");
bindPhoto("idPhotoInput2",{set:(p,t)=>{state.id2.photo=p;state.id2.time=t;},get:()=>state.id2.photo,time:()=>state.id2.time},"idPhotoLabel2","idPhotoThumb2","idPhotoImg2","idPhotoMeta2");

/* BAN */
let acTimer=null,acItems=[],acActive=-1;
const bienInput=document.getElementById("bien"),bienList=document.getElementById("bienList"),bienStatus=document.getElementById("bienStatus");
function setStatus(t,cls){bienStatus.textContent=t;bienStatus.className="ac-status"+(cls?" "+cls:"");}
function hideList(){bienList.classList.remove("show");bienList.innerHTML="";acItems=[];acActive=-1;}
function searchAddr(q){setStatus("Recherche…","busy");
  fetch("https://api-adresse.data.gouv.fr/search/?limit=5&autocomplete=1&q="+encodeURIComponent(q)).then(r=>r.ok?r.json():Promise.reject()).then(d=>{
    acItems=d.features||[];if(!acItems.length){hideList();setStatus("Adresse non reconnue dans la Base Adresse Nationale","warn");return;}
    setStatus("");bienList.innerHTML=acItems.map((f,i)=>{const p=f.properties;return `<div class="ac-item" data-i="${i}">${p.name||p.label}<span class="ctx">${p.postcode||""} ${p.city||""}${p.context?" · "+p.context:""}</span></div>`;}).join("");
    bienList.classList.add("show");bienList.querySelectorAll(".ac-item").forEach(el=>{el.onclick=()=>selectAddr(parseInt(el.dataset.i));});
  }).catch(()=>{hideList();setStatus("Vérification indisponible (hors ligne) — saisie libre acceptée","warn");});}
function selectAddr(i){const f=acItems[i];if(!f)return;bienInput.value=f.properties.label;setStatus("Adresse vérifiée — Base Adresse Nationale (correspondance "+Math.round((f.properties.score||0)*100)+"%)","ok");hideList();render();}
bienInput.addEventListener("input",()=>{const q=bienInput.value.trim();render();if(acTimer)clearTimeout(acTimer);if(q.length<4){hideList();setStatus("");return;}acTimer=setTimeout(()=>searchAddr(q),250);});
bienInput.addEventListener("keydown",e=>{if(!bienList.classList.contains("show"))return;const items=bienList.querySelectorAll(".ac-item");
  if(e.key==="ArrowDown"){e.preventDefault();acActive=Math.min(acActive+1,items.length-1);}else if(e.key==="ArrowUp"){e.preventDefault();acActive=Math.max(acActive-1,0);}
  else if(e.key==="Enter"&&acActive>=0){e.preventDefault();selectAddr(acActive);return;}else if(e.key==="Escape"){hideList();return;}
  items.forEach((el,i)=>el.classList.toggle("active",i===acActive));});
document.addEventListener("click",e=>{if(!document.getElementById("bienAc").contains(e.target))hideList();});

/* PDF / e-mail */
function slug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40);}
function pdfName(){const bien=val("bien");return DOCSLUG+(bien?"-"+slug(bien):"")+".pdf";}
function setBusy(btn,t){if(!btn)return"";const o=btn.textContent;btn.textContent=t;btn.disabled=true;return o;}
function unBusy(btn,o){if(!btn)return;btn.textContent=o;btn.disabled=false;}
async function buildPdf(){if(!window.html2canvas||!window.jspdf)throw new Error("libs");if(document.fonts&&document.fonts.ready){try{await document.fonts.ready;}catch(e){}}
  const canvas=await html2canvas(document.getElementById("doc"),{scale:2,backgroundColor:"#ffffff",useCORS:true});const img=canvas.toDataURL("image/jpeg",0.92);
  const {jsPDF}=window.jspdf;const pdf=new jsPDF("p","mm","a4");const pw=pdf.internal.pageSize.getWidth(),ph2=pdf.internal.pageSize.getHeight(),margin=8,usableW=pw-margin*2,pageH=ph2-margin*2;
  const imgH=canvas.height*usableW/canvas.width;let heightLeft=imgH,position=margin;pdf.addImage(img,"JPEG",margin,position,usableW,imgH);heightLeft-=pageH;
  while(heightLeft>0){position=margin-(imgH-heightLeft);pdf.addPage();pdf.addImage(img,"JPEG",margin,position,usableW,imgH);heightLeft-=pageH;}return pdf;}
async function downloadPdf(btn){const o=setBusy(btn,"Génération…");try{const pdf=await buildPdf();pdf.save(pdfName());}catch(e){window.print();}finally{unBusy(btn,o);}}
async function sendMail(btn){const bien=val("bien");const subject=DOCTITLE+(bien?" — "+bien:"");const body=document.getElementById("doc").innerText;const o=setBusy(btn,"Préparation…");
  try{const pdf=await buildPdf();const file=new File([pdf.output("blob")],pdfName(),{type:"application/pdf"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:subject,text:body});}
    else{pdf.save(pdfName());window.location.href="mailto:?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body+"\n\n(PDF téléchargé : à joindre au message.)");}}
  catch(e){window.location.href="mailto:?subject="+encodeURIComponent(subject)+"&body="+encodeURIComponent(body+"\n\n(Pensez à joindre le PDF.)");}finally{unBusy(btn,o);}}
function copyText(){const txt=document.getElementById("doc").innerText;const done=()=>{const t=document.getElementById("toast");t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(done).catch(()=>{});
  else{const a=document.createElement("textarea");a.value=txt;document.body.appendChild(a);a.select();try{document.execCommand("copy");done();}catch(e){}document.body.removeChild(a);}}

function keysBlockHtml(){const r=state.keys.filter(k=>k.on);
  if(r.length)return `<p><b>Clés et moyens d'accès concernés :</b></p><ul class="keys-list">${r.map(k=>`<li>${k.label} — ${k.qty} ${k.qty>1?"exemplaires":"exemplaire"}</li>`).join("")}</ul>`;
  if(state.photo)return `<p><b>Clés et moyens d'accès :</b> voir la photographie annexée.</p>`;
  return `<p class="muted">— clés et accès à renseigner : prendre la photo ou déplier le détail —</p>`;}
function partialClauseHtml(){if(state.remise!=="Partielle")return"";const what=val("missingWhat"),who=val("missingWho"),when=fmtDateInput(val("missingWhen"));
  return ` Ne sont pas remis ce jour : ${what||ph("(à préciser)")}${who?`, détenus par ${who}`:""}${when?`, remise prévue le ${when}`:""}.`;}
function sigBlock(s){return `<div class="s"><div class="line"></div><small>${s[0]}${s[1]?`<br>${s[1]}`:""}</small></div>`;}

function render(){
  buildKeys();buildRemise();buildIdSeg("id1","idTypeSeg1");buildIdSeg("id2","idTypeSeg2");
  const bien=val("bien"),vendeur=val("vendeur"),acq=val("acquereur"),now=new Date();
  const partialClause=partialClauseHtml();
  const objV=state.remise==="Complète"?"l'intégralité des clés et moyens d'accès du bien désigné ci-dessus, et qu'aucun autre double ne demeure entre mes mains.":"les clés et moyens d'accès visés ci-dessus."+partialClause;
  const reserve=state.remise==="Partielle"?", sous réserve des éléments non remis indiqués ci-dessus":"";
  const lead=`Le ${fmtDate(now)}${bien?`, concernant le bien sis <b>${bien}</b>`:""}, les parties déclarent ce qui suit.`;
  const b1=`<div class="declbox"><div class="who">Déclaration du vendeur</div>Je soussigné(e) <b>${vendeur||ph("(vendeur)")}</b>, déclare remettre ce jour à <b>${acq||ph("(acquéreur)")}</b> ${objV}${idSentence("id1","du vendeur")}</div>`;
  const b2=`<div class="declbox"><div class="who">Constatation de l'acquéreur</div>Je soussigné(e) <b>${acq||ph("(acquéreur)")}</b>, constate la remise des clés et moyens d'accès ci-dessus et en accuse réception${reserve}.${idSentence("id2","de l'acquéreur")}</div>`;
  const items=[];
  if(state.photo)items.push(`<div class="proof-item"><img src="${state.photo}"><div class="cap">Photographie des clés — ${fmtDT(state.photoTime)}</div></div>`);
  if(state.id1.photo)items.push(`<div class="proof-item"><img src="${state.id1.photo}"><div class="cap">Pièce d'identité (vendeur) — ${fmtDT(state.id1.time)}</div></div>`);
  if(state.id2.photo)items.push(`<div class="proof-item"><img src="${state.id2.photo}"><div class="cap">Pièce d'identité (acquéreur) — ${fmtDT(state.id2.time)}</div></div>`);
  const proofs=items.length?`<div class="proofs">${items.join("")}</div>`:`<p class="muted">— photographie des clés à prendre —</p>`;
  const foot=`Bordereau établi en l'étude ${OFFICE} ; les photographies ont été prises séance tenante et annexées aux présentes. L'office n'atteste pas du contenu des déclarations, qui relèvent des seules parties.`;
  document.getElementById("doc").innerHTML=`<div class="head"><div class="office">${OFFICE}</div><div class="title">${DOCTITLE}</div></div>
    <p class="lead">${lead}</p>${keysBlockHtml()}${b1}${b2}${proofs}
    <div class="sigs">${sigBlock(["Le vendeur",""])}${sigBlock(["L'acquéreur",""])}</div><div class="footnote">${foot}</div>`;
}
["bien","vendeur","acquereur","idNum1","idNum2","missingWhat","missingWho","missingWhen"].forEach(id=>{const e=document.getElementById(id);if(e&&id!=="bien")e.addEventListener("input",render);});
render();
